intro:
  - "We are pleased to announce the 3rd Digital Brain Workshop 2026, an international workshop related to digital brain research, neuroimaging, brain simulation, visualization, and open science platforms in the context of AMED Brain/MINDS 2.0."
  - "The workshop will include invited lectures by researchers from Japan and overseas, hands-on sessions on Digital Brain Neuro-Workflow and Brain Simulation and Visualization, and poster presentations by early-career researchers and students."

